<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CivicFix Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }

    header {
      background: linear-gradient(135deg, #1e3a5f, #0ea5e9);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 28px; color: white; letter-spacing: 2px; }
    header p { color: #bae6fd; font-size: 13px; }

    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 24px;
      border-left: 4px solid #0ea5e9;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-4px); }
    .card h3 { font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
    .card p { font-size: 32px; font-weight: bold; color: #38bdf8; }

    .section { background: #1e293b; border-radius: 12px; padding: 28px; margin-bottom: 30px; }
    .section h2 { font-size: 18px; color: #38bdf8; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }

    input, select, textarea {
      width: 100%; padding: 10px 14px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0;
      margin-bottom: 14px; font-size: 14px;
    }
    button {
      background: #0ea5e9; color: white;
      border: none; padding: 12px 28px;
      border-radius: 8px; cursor: pointer;
      font-size: 15px; font-weight: bold;
      transition: background 0.2s;
    }
    button:hover { background: #0284c7; }

    table { width: 100%; border-collapse: collapse; }
    th { background: #0f172a; color: #38bdf8; padding: 12px; text-align: left; font-size: 13px; }
    td { padding: 12px; border-bottom: 1px solid #1e293b; font-size: 14px; color: #cbd5e1; }
    tr:hover td { background: #1e3a5f; }

    .badge {
      padding: 4px 10px; border-radius: 20px;
      font-size: 12px; font-weight: bold;
    }
    .PENDING { background: #fef08a; color: #713f12; }
    .RESOLVED { background: #bbf7d0; color: #14532d; }
    .IN_PROGRESS { background: #bae6fd; color: #0c4a6e; }

    #message {
      margin-top: 14px; padding: 12px;
      border-radius: 8px; background: #0f172a;
      color: #4ade80; font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏙️ CivicFix</h1>
    <p>Smart Civic Complaint Management System</p>
  </div>
  <div style="color:#bae6fd; font-size:13px;">
    Powered by Spring Boot + Observer Pattern
  </div>
</header>

<div class="container">

  <!-- Stats Cards -->
  <div class="cards">
    <div class="card">
      <h3>Total Complaints</h3>
      <p id="totalCount">0</p>
    </div>
    <div class="card" style="border-color:#4ade80;">
      <h3>Resolved</h3>
      <p id="resolvedCount" style="color:#4ade80;">0</p>
    </div>
    <div class="card" style="border-color:#f59e0b;">
      <h3>Pending</h3>
      <p id="pendingCount" style="color:#f59e0b;">0</p>
    </div>
  </div>

  <!-- Submit Complaint -->
  <div class="section">
    <h2>📝 Submit New Complaint</h2>
    <input type="text" id="title" placeholder="Complaint Title" />
    <textarea id="description" rows="3" placeholder="Describe the issue..."></textarea>
    <select id="category">
      <option value="">Select Category</option>
      <option value="electrical">Electrical</option>
      <option value="plumbing">Plumbing</option>
      <option value="sanitation">Sanitation</option>
      <option value="road">Road Maintenance</option>
    </select>
    <button onclick="submitComplaint()">Submit Complaint</button>
    <div id="message"></div>
  </div>

  <!-- Complaints Table -->
  <div class="section">
    <h2>📋 All Complaints</h2>
    <table>
      <thead>
        <tr>
          <th>#ID</th>
          <th>Title</th>
          <th>Category</th>
          <th>Status</th>
          <th>Department</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="complaintsTable">
        <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  const deptMap = { 1: "Electrical", 2: "Plumbing", 3: "Sanitation", 4: "Road Maintenance" };

  async function loadComplaints() {
    const res = await fetch('/complaints');
    const data = await res.json();

    document.getElementById('totalCount').innerText = data.length;
    document.getElementById('resolvedCount').innerText = data.filter(c => c.status === 'RESOLVED').length;
    document.getElementById('pendingCount').innerText = data.filter(c => c.status === 'PENDING').length;

    const tbody = document.getElementById('complaintsTable');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No complaints yet.</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(c => `
      <tr>
        <td>#${c.id}</td>
        <td>${c.title}</td>
        <td>${c.category}</td>
        <td><span class="badge ${c.status}">${c.status}</span></td>
        <td>${deptMap[c.departmentId] || 'Unknown'}</td>
        <td>
          <select onchange="updateStatus(${c.id}, this.value)">
            <option value="">Change Status</option>
            <option value="PENDING">PENDING</option>
            <option value="IN_PROGRESS">IN PROGRESS</option>
            <option value="RESOLVED">RESOLVED</option>
          </select>
        </td>
      </tr>
    `).join('');
  }

  async function submitComplaint() {
    const title = document.getElementById('title').value;
    const description = document.getElementById('description').value;
    const category = document.getElementById('category').value;

    if (!title || !description || !category) {
      alert('Please fill all fields!');
      return;
    }

    const res = await fetch('/complaints', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description, category })
    });

    const msg = await res.text();
    const msgDiv = document.getElementById('message');
    msgDiv.style.display = 'block';
    msgDiv.innerText = '✅ ' + msg;

    document.getElementById('title').value = '';
    document.getElementById('description').value = '';
    document.getElementById('category').value = '';

    loadComplaints();
  }

  async function updateStatus(id, status) {
    if (!status) return;
    await fetch(`/complaints/${id}/status?status=${status}`, { method: 'PUT' });
    loadComplaints();
  }

  loadComplaints();
  setInterval(loadComplaints, 5000);
</script>

</body>
</html>
